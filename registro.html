<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reclutamiento | Estrada-Web</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body style="background: var(--azul-patria);">
    <div class="auth-page anim-heroica">
        <div class="auth-card" style="border-top: 8px solid var(--oro-honor);">
            <h2>Forma parte del Legado</h2>
            <p>Únete a los estudiantes defensores de la historia nacional</p>
            <form id="registro-form">
                <input type="text" placeholder="Nombre Completo" required>
                <input type="email" placeholder="Correo Electrónico" required>
                <input type="password" placeholder="Crea una contraseña" required>
                <div style="text-align: left; font-size: 0.8rem; margin: 10px 0;">
                    <input type="checkbox" required> Acepto defender la verdad histórica.
                </div>
                <button type="submit" class="btn-p" style="background: var(--azul-oscuro);">Crear Cuenta de Recluta</button>
            </form>
            <p style="margin-top:20px;">¿Ya tienes cuenta? <a href="login.html" style="color:var(--azul-patria);">Ingresar</a></p>
        </div>
    </div>
</body>
</html>
