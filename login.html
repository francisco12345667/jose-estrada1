<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Estudiante | Estrada-Web</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body style="background: var(--sepia-historia);">
    <div class="auth-page anim-heroica">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="img/retrato.jpg" style="width: 80px; border-radius: 50%; border: 2px solid var(--oro-honor);">
                <h2>Cuartel General</h2>
                <p>Ingresa para guardar tu progreso</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label>Correo Institucional</label>
                    <input type="email" placeholder="usuario@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-p">Iniciar Sesión</button>
            </form>
            <p style="margin-top:20px;">¿Eres nuevo? <a href="registro.html" style="color:var(--azul-patria);">Regístrate aquí</a></p>
            <a href="index.html" class="link-text">← Volver al inicio</a>
        </div>
    </div>
</body>
</html>
